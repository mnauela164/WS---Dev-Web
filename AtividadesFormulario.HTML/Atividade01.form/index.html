<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 01</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form action="">
    <h1>Atividade 1</h1>
    <p>Escreva abaixo a informação necessária</p>
    <label for="nome">Cidade:</label>
    <input type="text" id="nome" placeholder="Digite sua Cidade" required >
    <br><br>
    <label for="email">E-mail:</label>
    <input type="email" name="email" id="email" placeholder="E-mail profissional">
    <br><br>
    <label >Código:</label>
    <input type="password" name="codigo_secreto" placeholder=" Código secreto da Cidade">
    <br><br>
    <label for="confirmação">Enviar Formulário</label>
    <input type="submit" value="Enviar">
    <br><br>
    <label for="limpar">Limpar Formulário</label>
    <input type="reset" value="Limpar">
    <div class="container">
</form>
</body>
</html>
