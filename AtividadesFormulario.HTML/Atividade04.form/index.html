<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Crie um formulário para inscrição em um evento, com opções de checkbox para escolher os materiais necessários
e opções de radio para selecionar apenas uma forma de participação. Estilize conforme sua escolha usando CSS. -->
</head>
<body>
    <form action="">
        <h1>Formulário de Inscrição para Evento</h1>

        <label for="name">Nome:</label>
        <input type="text" id="name" name="name" required>
        <br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <h2>Materiais Necessários:</h2>
        <label><input type="checkbox" name="materials" value="Caderno"> Caderno</label>
        <label><input type="checkbox" name="materials" value="Caneta"> Caneta</label>
        <label><input type="checkbox" name="materials" value="Laptop"> Laptop</label>

        <h2>Forma de Participação:</h2>
        <label><input type="radio" name="participation" value="Presencial" required> Presencial</label>
        <label><input type="radio" name="participation" value="Online"> Online</label>

        <button type="submit">Enviar Inscrição</button>

</body>
</html>
