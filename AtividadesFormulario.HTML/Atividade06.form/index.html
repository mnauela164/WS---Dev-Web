<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 6</title>
    <link rel="stylesheet" href="style.css">
    <!--Crie um formulário de feedback para um cinema, com um campo <textarea> para
    o usuário escrever sua opinião sobre o filme e um <output> exibindo a mensagem “Feedback enviado com sucesso”. Estilize conforme sua escolha usando CSS.-->
</head>
<body>
    <form action="">
        <h1>Formulário de Feedback para Cinema</h1>

        <label for="feedback">Sua Opinião sobre o Filme:</label><br>
        <textarea 
        id="feedback"
        name="feedback" 
        rows="5" 
        cols="50" 
        required></textarea><br><br>

        <button type="submit">Enviar Feedback</button>
        <output id="feedback-enviado"> Feedback Enviado com sucesso </output>
        </form>
</body>
</html>
