<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 02</title>
</head>
<body>
    <label for="numero">Quantidade: </label>
    <input type="number" id="idade" min="1" max="25">

    <label for="senha">Senha: </label>
    <input type="password" minlength="10" maxlength="30" required placeholder="Senha" title="Aqui é um campo de senha">
    <br><br>
    <label for="confirmação">Enviar Formulário</label>
    <input type="submit" value="Enviar">
    <br>
    <label for="limpar">Limpar Formulário</label>
    <input type="reset" value="Limpar">
</body>
</html>
