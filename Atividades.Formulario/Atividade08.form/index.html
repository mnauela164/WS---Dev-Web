<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 08</title>
    <link rel="stylesheet" href="style.css">
    <!--Crie um formulário contendo um botão para enviar os dados, outro para limpar os campos preenchidos e um
    botão comum para exibir a mensagem “Cadastro em análise”. Estilize conforme sua escolha usando CSS.-->
</head>
<body>
    <form action="">
        <h1>Formulário de Cadastro</h1>

        <label for="name">Nome:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="data">Data de Nascimento: </label>
        <input type="date" name="data" id="data">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="tel">Telefone:</label>
        <input type="tel" id="tel" name="tel" required><br><br>

        <button type="submit">Enviar Dados</button>
        <button type="reset">Limpar Campos</button>
        <button type="button" onclick="alert('Cadastro em análise')">Exibir Mensagem</button>
</body>
</html>
