<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 07</title>
    <link rel="stylesheet" href="style.css">
    <!-- Crie um formulário para personalizar um perfil de usuário, com um campo para
    enviar uma foto, um campo para escolher a cor favorita do perfil e um botão de
    envio usando imagem. Estilize conforme sua escolha usando CSS.-->
</head>
<body>
    <form action="">
        <h1>Formulário de Personalização de Perfil de Usuário</h1>

        <label for="photo">Enviar Foto de Perfil:</label>
        <input type="file" id="photo" name="photo" accept="image/*" required><br><br>

        <label for="color">Escolha a Cor Favorita do Perfil:</label>
        <input type="color" id="color" name="color" required><br><br>

        <button type="submit">
            <img src="submit-button-image.png" alt="Enviar">
        </button>
</body>
</html>
