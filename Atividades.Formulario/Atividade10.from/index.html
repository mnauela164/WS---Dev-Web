<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 10</title>
    <link rel="stylesheet" href="style.css">
    <!-- Crie um formulário de cadastro contendo
    nome completo, e-mail, senha, data de
    nascimento, seleção de gênero, aceite dos
    termos de uso e botões para cadastrar e
    limpar os campos. Estilize conforme sua
    escolha usando CSS. -->
</head>
<body>
    <form action="" method="post">
        <h2>Dados Pessoais</h2>
        <label for="nome">Nome Completo: </label>
        <input type="text" name="nome" id="nome" placeholder="Digite seu Nome Completo">
        <br><br>

        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email">
        <br><br>

        <label for="senha">Senha: </label>
        <input type="password" name="senha" id="senha" placeholder="Digite Aqui sua Senha de Acesso">
        <br><br>

        <label for="data">Data de Nascimento: </label>
        <input type="date" name="data" id="data">
        <br><br>

        <label for="idade">Idade: </label>
        <input type="number" name="idade" id="idade">
        <br><br>

        <label for="genero">Gênero: </label>
         <select name="genero" id="genero" required>
            <option value="" selected disabled>Selecione...</option>
            <option value="feminimo">Feminino</option>
            <option value="masculuno">Masculino</option>
         </select>
         <br><br>
         <label for="opcoes">
            <input type="checkbox" name="termo" id="termo">Concorda com os termmos de uso?
        </label><br>
          <p>Aceita nossos cookies</p>
        <label for="cookie">
            <input type="radio">Aceitar todos
        </label>
        <label for="cookie">
            <input type="radio">Rejeitar todos
        </label><br><br>
         <button type="submit">Cadastrar Dados</button>
         <button type="submit">Limpar Dados</button>
    </form>

</body>
</html>
