<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PseudoClasses</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>PseudoClasses</h1>
    <h2>:houver</h2>
    <button>Clique Aqui</button>
    <hr/>
    <h2>:focus</h2>
    <input type="text" placeholder="Clique Aqui">
    <hr/>
    <h2>:active</h2>
    <button>Clique e Segure</button>
    <hr/>
    <h2>:visited</h2>
    <a href="google.com">Clique</a>
    <hr/>
    <h2>:checked</h2>
    <label for="">
        <input type="checkbox">
    </label>
    <hr/>
    <h2>:disabled</h2>
    <input type="text" value="Desativado" disabled>
    <hr/>
    <h2>/:first-child, :last-child-, :nth-child(n)</h2>
    <ul>
        <li>Primeiro</li>
        <li>Segundo</li>
        <li>Terceiro</li>
        <li>Ultimo</li>
    </ul>
</body>
</html>
