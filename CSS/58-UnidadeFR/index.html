<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidade FR</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Unidade FR</h1>
    <h2>Colunas com espaçamento igual</h2>
    <section class="container grid-igual">
        <div class="item">1fr</div>
        <div class="item">1fr</div>
        <div class="item">1fr</div>
    </section>
    <h2>Coluna do meio maior</h2>
    <section class="container grid-meio-maior">
        <div class="item">1fr</div>
        <div class="item">2fr</div>
        <div class="item">1fr</div>
    </section>
    <h2>Colunas com espaçamento crescente</h2>
    <section class="container grid-crescente">
        <div class="item">1fr</div>
        <div class="item">2fr</div>
        <div class="item">3fr</div>
    </section>
</body>
</html>
