<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Margin auto no flexbox</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <h1>Margin auto no flexbox</h1>
    <h2>Margin Left Auto</h2>
    <section class="linha">
      <div class="item">Esquerda</div>
      <div class="item ml-auto">Direita</div>
    </section>
    <h2>Margin Right Auto</h2>
    <section class="linha">
      <div class="item mr-auto">Esquerda</div>
      <div class="item">Direita</div>
    </section>
    <h2>Margin Top Auto</h2>
    <section class="coluna">
      <div class="item">Cima</div>
      <div class="item mt-auto">Baixo</div>
    </section>
    <h2>Margin Bottom Auto</h2>
    <section class="coluna">
      <div class="item mb-auto">Cima</div>
      <div class="item">Baixo</div>
    </section>
  </body>
</html>
