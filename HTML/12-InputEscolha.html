<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputs de escolhas</title>
</head>
<body>
    <h1>Inputs de Escolhas</h1>
    <form action="">
    <label for="opcao">
        <input type="radio">Opção 1
    </label>

    <label for="opcao">
        <input type="radio" checked>Opção 2
    </label>

    <label for="opcao">
        <input type="radio">Opção 3
    </label>
<br>
<br>
    <label for="opcoes">
        <input type="checkbox" name="opcoes" id="opcao1">Opcao 1
    </label>

    <label for="opcoes">
        <input type="checkbox" name="opcoes" id="opcao2">Opcao 2
    </label>

    <label for="opcoes">
        <input type="checkbox" name="opcoes" id="opcao3">Opcao 3
    </label>

</form>
</body>
</html>
