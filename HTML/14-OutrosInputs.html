<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outros Inputs</title>
</head>
<body>
    <h1>Outros inputs</h1>
    <label for="cor">Cor</label>
    <input type="color" name="cor" id="cor">
    <br/><br/>

    <label for="data">Data</label>
    <input type="email" name="email" id="email" placeholder="Digite um email">
    <br/><br/>

    <label for="url">URL</label>
    <input type="url" name="url" id="url" placeholder="https://">
    <br/><br/>

    <label for="bio">Biografia</label>
    <textarea name="bio" id="bio" rows="5" cols="30" placeholder="Escreva sua bioigrafia"></textarea>
</body>
</html>
